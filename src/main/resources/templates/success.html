<!DOCTYPE html>
<html>

<head>

    <title>

        Password Reset Successful

    </title>

    <style>

        body{

            margin:0;

            background:linear-gradient(
                    135deg,
                    #0f172a,
                    #1e293b);

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;

            font-family:Segoe UI;

        }

        .card{

            background:white;

            width:450px;

            padding:40px;

            border-radius:20px;

            text-align:center;

            box-shadow:
                    0 10px 30px rgba(
                            0,
                            0,
                            0,
                            .3);

        }

        .icon{

            font-size:30px;

            color:#22c55e;

        }

        h2{

            color:#334155;

        }

        p{

            color:#64748b;

        }

        button{

            margin-top:20px;

            background:#2563eb;

            border:none;

            color:white;

            padding:15px 30px;

            border-radius:10px;

            cursor:pointer;

        }

    </style>

</head>

<body>

<div class="card">

    <div class="icon">
        Congratulations
    </div>

    <h2>

        Password Reset Successful

    </h2>

    <p>

        You can now login with your new password.

    </p>

    <button>

        Go To Login

    </button>

</div>

</body>

</html>
