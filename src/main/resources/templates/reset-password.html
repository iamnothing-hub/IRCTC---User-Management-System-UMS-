<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>IRCTC Password Reset</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
        }

        .navbar{
            box-shadow:0 4px 10px rgba(0,0,0,.2);
        }

        .card{
            border:none;
            border-radius:20px;
            overflow:hidden;
        }

        .card-header{
            background:#0d6efd;
            color:white;
        }

        .validation-list li{
            margin-bottom:8px;
            list-style:none;
        }

        .success{
            color:green;
            font-weight:600;
        }

        .danger{
            color:red;
            font-weight:600;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container">

        <span class="navbar-brand fw-bold">

            IRCTC User Management System

        </span>

    </div>

</nav>


<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg">

                <div class="card-header text-center">

                    <h3>

                        Reset Password

                    </h3>

                </div>

                <div class="card-body p-4">

<!--                    <form method="post"-->
<!--                          action="/auth/reset-password">-->
                    <form
                            th:action="@{/auth/reset-password}"
                            th:object="${resetPasswordRequest}"
                            method="post">

                        <!-- Spring Security CSRF -->

<!--                        <input type="hidden"-->
<!--                               th:name="${_csrf.parameterName}"-->
<!--                               th:value="${_csrf.token}">-->

                        <!-- Token -->

                        <input type="hidden"
                               name="*{token}"
                               >


                        <!-- Password -->

                        <div class="mb-3">

                            <label class="form-label">

                                New Password

                            </label>

                            <div class="input-group">

<!--                                <input-->
<!--                                        type="password"-->
<!--                                        class="form-control"-->
<!--                                        id="password"-->
<!--                                        name="newPassword">-->
                                <input
                                        type="password"
                                        class="form-control"
                                        th:field="*{newPassword}"
                                        id="password">

                                <button
                                        type="button"
                                        class="btn btn-outline-secondary"
                                        onclick="togglePassword()">

                                    👁

                                </button>

                            </div>

                        </div>


                        <!-- Confirm Password -->

                        <div class="mb-3">

                            <label class="form-label">

                                Confirm Password

                            </label>

                            <div class="input-group">

                                <input
                                        type="password"
                                        class="form-control"
                                        id="confirmPassword">

                                <button
                                        type="button"
                                        class="btn btn-outline-secondary"
                                        onclick="toggleConfirmPassword()">

                                    👁

                                </button>

                            </div>

                            <div id="passwordMatch"
                                 class="mt-2">

                            </div>

                        </div>


                        <!-- Validation Rules -->

                        <ul class="validation-list small">

                            <li id="length"
                                class="danger">

                                ❌ Minimum 8 characters

                            </li>

                            <li id="upper"
                                class="danger">

                                ❌ One uppercase letter

                            </li>

                            <li id="lower"
                                class="danger">

                                ❌ One lowercase letter

                            </li>

                            <li id="digit"
                                class="danger">

                                ❌ One digit

                            </li>

                            <li id="special"
                                class="danger">

                                ❌ One special character

                            </li>

                        </ul>


                        <!-- Strength Meter -->

                        <label class="form-label mt-3">

                            Password Strength

                        </label>

                        <div class="progress">

                            <div class="progress-bar"
                                 id="strengthBar"
                                 style="width:0%">

                            </div>

                        </div>

                        <div id="strengthText"
                             class="fw-bold mt-2">

                        </div>


                        <div class="d-grid mt-4">

                            <button
                                    class="btn btn-primary btn-lg"
                                    id="resetBtn"
                                    disabled>

                                Reset Password

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>


<script>

    let passwordInput =
        document.getElementById("password");

    let confirmPasswordInput =
        document.getElementById("confirmPassword");

    let resetButton =
        document.getElementById("resetBtn");



    passwordInput.addEventListener(
        "keyup",
        validatePassword);

    confirmPasswordInput.addEventListener(
        "keyup",
        validatePassword);



    function validatePassword(){

        let password =
            passwordInput.value;

        let confirmPassword =
            confirmPasswordInput.value;

        let score = 0;

        updateRule(
            "length",
            password.length >= 8);

        if(password.length >= 8)
            score++;


        updateRule(
            "upper",
            /[A-Z]/.test(password));

        if(/[A-Z]/.test(password))
            score++;


        updateRule(
            "lower",
            /[a-z]/.test(password));

        if(/[a-z]/.test(password))
            score++;


        updateRule(
            "digit",
            /[0-9]/.test(password));

        if(/[0-9]/.test(password))
            score++;


        updateRule(
            "special",
            /[@$!%*?&]/.test(password));

        if(/[@$!%*?&]/.test(password))
            score++;


        updateStrength(score);

        validatePasswordMatch();

    }



    function updateRule(
        id,
        valid){

        let element =
            document.getElementById(id);

        if(valid){

            element.className =
                "success";

            element.innerHTML =
                "✅ " +
                element.innerText.substring(2);

        }
        else{

            element.className =
                "danger";

            element.innerHTML =
                "❌ " +
                element.innerText.substring(2);

        }

    }



    function validatePasswordMatch(){

        let password =
            passwordInput.value;

        let confirmPassword =
            confirmPasswordInput.value;

        let match =
            document.getElementById(
                "passwordMatch");

        if(confirmPassword===""){

            match.innerHTML="";

            resetButton.disabled=true;

            return;

        }

        if(password===confirmPassword){

            match.innerHTML =
                "<span class='success'>✅ Passwords match</span>";

            resetButton.disabled=false;

        }
        else{

            match.innerHTML =
                "<span class='danger'>❌ Passwords do not match</span>";

            resetButton.disabled=true;

        }

    }



    function updateStrength(
        score){

        let bar =
            document.getElementById(
                "strengthBar");

        let text =
            document.getElementById(
                "strengthText");


        if(score<=2){

            bar.className =
                "progress-bar bg-danger";

            bar.style.width =
                "30%";

            text.innerHTML =
                "Weak";

        }
        else if(score<=4){

            bar.className =
                "progress-bar bg-warning";

            bar.style.width =
                "70%";

            text.innerHTML =
                "Medium";

        }
        else{

            bar.className =
                "progress-bar bg-success";

            bar.style.width =
                "100%";

            text.innerHTML =
                "Strong";

        }

    }



    function togglePassword(){

        let field =
            document.getElementById(
                "password");

        field.type =
            field.type==="password"
            ? "text"
            : "password";

    }



    function toggleConfirmPassword(){

        let field =
            document.getElementById(
                "confirmPassword");

        field.type =
            field.type==="password"
            ? "text"
            : "password";

    }

</script>

</body>

</html>
```
